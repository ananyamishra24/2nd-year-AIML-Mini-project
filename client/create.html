<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Story · Brave Story Maker</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<div class="create-bg">
  <div class="create-blob-r"></div>
  <div class="create-blob-l"></div>

  <div class="create-inner">
    <a class="create-back" href="/">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      Back to Library
    </a>

    <div class="create-card">
      <div class="create-header">
        <div class="create-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </div>
        <h1>Create a Magic Story</h1>
        <p>Pick a hero and we'll write their legend.</p>
      </div>

      <form id="create-form" class="form-space" autocomplete="off">

        <!-- ── Hero Picker ── -->
        <div class="form-group">
          <div class="form-section-label">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
              class="ico-primary">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Choose Your Hero
          </div>
          <p class="traits-desc">Select who this story is for. Hero details come from their profile.</p>

          <!-- Loaded by JS -->
          <div class="hero-picker-grid" id="hero-picker-grid">
            <div class="hero-picker-skeleton"></div>
            <div class="hero-picker-skeleton"></div>
            <div class="hero-picker-skeleton"></div>
          </div>

          <!-- Summary of selected hero's profile data -->
          <div class="hero-summary hidden" id="hero-summary">
            <div class="hero-summary-row">
              <span class="hero-summary-chip" id="hs-age"></span>
              <span class="hero-summary-chip" id="hs-gender"></span>
              <span class="hero-summary-chip hs-medical hidden" id="hs-medical"></span>
              <span class="hero-summary-chip hs-traits hidden" id="hs-traits"></span>
            </div>
            <a href="/profiles" class="hero-summary-edit">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              Edit hero profile
            </a>
          </div>

          <p class="form-error hidden" id="hero-error">Please select a hero first.</p>
        </div>

        <!-- ── Story Settings (collapsible) ── -->
        <div class="form-group">
          <button type="button" class="settings-toggle" id="settings-toggle">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Customize Story Settings
            <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>

          <div class="settings-panel hidden" id="settings-panel">
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="storyLength">Story Length</label>
                <select id="storyLength" name="storyLength" class="form-select">
                  <option value="">Auto (by age)</option>
                  <option value="short">Short (1 page)</option>
                  <option value="medium">Medium (3 pages)</option>
                  <option value="long">Long (5 pages)</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="tone">Tone</label>
                <select id="tone" name="tone" class="form-select">
                  <option value="">Auto</option>
                  <option value="funny">Funny</option>
                  <option value="adventurous">Adventurous</option>
                  <option value="calming">Calming</option>
                  <option value="educational">Educational</option>
                </select>
              </div>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="theme">Theme</label>
                <select id="theme" name="theme" class="form-select">
                  <option value="">Auto</option>
                  <option value="superhero">Superhero</option>
                  <option value="space">Space Adventure</option>
                  <option value="underwater">Underwater</option>
                  <option value="jungle">Jungle</option>
                  <option value="fairy-tale">Fairy Tale</option>
                  <option value="dinosaur">Dinosaur World</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="villainType">Villain Type</label>
                <select id="villainType" name="villainType" class="form-select">
                  <option value="">Auto</option>
                  <option value="monster">Illness as a Monster</option>
                  <option value="storm">A Storm to Weather</option>
                  <option value="puzzle">A Puzzle to Solve</option>
                  <option value="shadow">A Shadow to Overcome</option>
                </select>
              </div>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" for="endingType">Ending</label>
                <select id="endingType" name="endingType" class="form-select">
                  <option value="">Auto (triumphant)</option>
                  <option value="triumphant">Triumphant</option>
                  <option value="peaceful">Peaceful</option>
                  <option value="cliffhanger">Cliffhanger</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="readingLevel">Reading Level</label>
                <select id="readingLevel" name="readingLevel" class="form-select">
                  <option value="">Auto (by age)</option>
                  <option value="toddler">Toddler (2–4)</option>
                  <option value="early-reader">Early Reader (5–7)</option>
                  <option value="older-child">Older Child (8–12)</option>
                  <option value="teen">Teen (13+)</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-xl" id="submit-btn" style="width:100%;border-radius:1rem">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
          </svg>
          Write My Story
        </button>

      </form>
    </div>
  </div>
</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay hidden" id="loading-overlay">
  <div class="loading-spinner-lg"></div>
  <p class="loading-title">Weaving Magic…</p>
  <p class="loading-sub">Creating a personalised story and illustrations</p>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<script src="/js/create.js"></script>
</body>
</html>
